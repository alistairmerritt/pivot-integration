blueprint:
  name: "Pivot - Announce"
  description: >
    Spoken announcements for a Pivot device via TTS. Combines bank and value
    announcements in a single automation.


    - **Bank change** — announces the entity name when you switch banks (only
      while in Control Mode). Requires the System Announcements switch to be on.

    - **Triple press** — re-announces the current bank's entity name.
      Requires the System Announcements switch to be on.

    - **Value announcement** — announces the current knob value after the knob
      settles (~600 ms debounce). Only fires for banks with the per-bank
      Announce Value switch turned on.


    Only the Device Suffix, Media Player, and TTS Engine are required — all
    other entity IDs are derived automatically.


    Requires the Pivot integration and Home Assistant Cloud (Nabu Casa) or
    another TTS provider.
  domain: automation
  input:
    suffix:
      name: Device Suffix
      description: >
        Your Pivot device suffix, e.g. `ha_voice_orange`. All Pivot entity
        IDs are derived automatically from this value.
      selector:
        text:

    media_player_entity:
      name: Media Player
      description: The VPE media player to speak through.
      selector:
        entity:
          domain: media_player

    tts_engine:
      name: TTS Engine
      description: TTS service entity to use.
      default: tts.home_assistant_cloud
      selector:
        entity:
          domain: tts

variables:
  suffix: !input suffix
  media_player_entity: !input media_player_entity
  tts_engine: !input tts_engine

trigger:
  # Bank changed (fired by the Pivot integration whenever the active bank changes)
  - trigger: event
    event_type: pivot_bank_changed
    event_data:
      suffix: !input suffix
    id: bank_change

  # Button press — used for triple press re-announcement
  - trigger: event
    event_type: pivot_button_press
    event_data:
      suffix: !input suffix
    id: button_press

  # Knob turned — fires after the integration applies the value to the entity
  - trigger: event
    event_type: pivot_knob_turn
    event_data:
      suffix: !input suffix
    id: knob_turn

action:
  - variables:
      mute_entity: "switch.{{ suffix }}_mute_announcements"
      announcements_switch: "switch.{{ suffix }}_announcements"
      control_mode_entity: "switch.{{ suffix }}_control_mode"

  - choose:

      # ── Triple press: re-announce current bank entity name ─────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_press'
                 and trigger.event.data.press_type == 'triple_press' }}
          - condition: template
            value_template: "{{ is_state(announcements_switch, 'on') }}"
          - condition: template
            value_template: "{{ not is_state(mute_entity, 'on') }}"
        sequence:
          - variables:
              bank_entity: "{{ trigger.event.data.bank_entity }}"
              entity_name: "{{ state_attr(bank_entity, 'friendly_name') or bank_entity }}"
          - condition: template
            value_template: >
              {{ bank_entity | length > 0
                 and bank_entity not in ('unknown', 'unavailable') }}
          - action: tts.speak
            target:
              entity_id: "{{ tts_engine }}"
            data:
              media_player_entity_id: "{{ media_player_entity }}"
              message: "{{ entity_name }}"

      # ── Bank change: announce entity name (Control Mode only) ──────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'bank_change' }}"
          - condition: template
            value_template: "{{ is_state(control_mode_entity, 'on') }}"
          - condition: template
            value_template: "{{ is_state(announcements_switch, 'on') }}"
          - condition: template
            value_template: "{{ not is_state(mute_entity, 'on') }}"
        sequence:
          - variables:
              bank_entity: "{{ trigger.event.data.bank_entity }}"
              entity_name: "{{ state_attr(bank_entity, 'friendly_name') or bank_entity }}"
          - condition: template
            value_template: >
              {{ bank_entity | length > 0
                 and bank_entity not in ('unknown', 'unavailable') }}
          - action: tts.speak
            target:
              entity_id: "{{ tts_engine }}"
            data:
              media_player_entity_id: "{{ media_player_entity }}"
              message: "{{ entity_name }}"

      # ── Knob turn: announce value after 600 ms debounce ───────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'knob_turn' }}"
        sequence:
          - variables:
              bank_idx: "{{ trigger.event.data.bank | int - 1 }}"
              announce_switch: "switch.{{ suffix }}_bank_{{ bank_idx }}_announce_value"
              bank_entity_id: "text.{{ suffix }}_bank_{{ bank_idx }}_entity"
          # Exit early if announce switch is off or no entity assigned
          - condition: template
            value_template: >
              {{ is_state(announce_switch, 'on')
                 and states(bank_entity_id) | length > 0 }}
          # Debounce — wait for knob to settle before announcing
          - delay:
              milliseconds: 600
          # Post-debounce: re-read current state
          - variables:
              target_entity: "{{ states(bank_entity_id) }}"
              domain: "{{ target_entity.split('.')[0] if '.' in target_entity else '' }}"
              bank_value: "{{ trigger.event.data.value | float(0) | round(0) | int }}"
          - condition: template
            value_template: >
              {{ not is_state(mute_entity, 'on')
                 and domain in ['climate', 'cover', 'light', 'media_player', 'fan', 'number']
                 and states(target_entity) not in ['unavailable', 'unknown'] }}
          - variables:
              tts_message: >
                {% if domain == 'climate' %}
                  {% set temp = state_attr(target_entity, 'temperature') %}
                  Temperature {{ temp | round(0) | int if temp is not none else 'unavailable' }} degrees.
                {% elif domain == 'cover' %}
                  {% set pos = state_attr(target_entity, 'current_position') %}
                  {{ pos | round(0) | int if pos is not none else 'Position unavailable' }} percent open.
                {% elif domain == 'light' %}
                  Brightness {{ bank_value }} percent.
                {% elif domain == 'media_player' %}
                  Volume {{ bank_value }} percent.
                {% elif domain == 'fan' %}
                  Speed {{ bank_value }} percent.
                {% elif domain == 'number' %}
                  {% set unit = state_attr(target_entity, 'unit_of_measurement') %}
                  Set to {{ states(target_entity) }}{% if unit %} {{ unit }}{% endif %}.
                {% endif %}
          - action: tts.speak
            target:
              entity_id: "{{ tts_engine }}"
            data:
              media_player_entity_id: "{{ media_player_entity }}"
              message: "{{ tts_message }}"

# mode:restart means a new knob_turn while the debounce is waiting cancels
# and restarts — only the settled value gets announced.
mode: restart
