blueprint:
  name: "Pivot — Bank Toggle"
  description: >
    Toggles the entity assigned to the currently active bank on a Pivot device.


    **Important:** When saving this script, set the script ID to
    `{suffix}_bank_toggle` so the full entity ID becomes
    `script.{suffix}_bank_toggle`. Replace `{suffix}` with your device suffix
    (e.g. `ha_voice_orange`). The firmware calls this entity ID directly on
    button press.


    Supports: lights, switches, fans, covers, media players (play/pause),
    scenes, and scripts.
  domain: script
  input:
    suffix:
      name: Device Suffix
      description: >
        Your Pivot device suffix, e.g. `ha_voice_orange`. All entity IDs
        are derived automatically from this value.
      selector:
        text:

variables:
  suffix: !input suffix

sequence:
  - variables:
      bank: "{{ states('number.' ~ suffix ~ '_active_bank') | int }}"
      bank_entity: "{{ states('text.' ~ suffix ~ '_bank_' ~ bank ~ '_entity') }}"
      domain: "{{ bank_entity.split('.')[0] if '.' in bank_entity else '' }}"
  - condition: template
    value_template: >
      {{ bank_entity | length > 0
         and bank_entity not in ('unknown', 'unavailable', 'timer') }}
  - choose:
      - conditions: "{{ domain == 'scene' }}"
        sequence:
          - action: scene.turn_on
            target:
              entity_id: "{{ bank_entity }}"
      - conditions: "{{ domain == 'script' }}"
        sequence:
          - action: script.turn_on
            target:
              entity_id: "{{ bank_entity }}"
      - conditions: "{{ domain == 'media_player' }}"
        sequence:
          - action: media_player.media_play_pause
            target:
              entity_id: "{{ bank_entity }}"
      - conditions: "{{ domain == 'cover' }}"
        sequence:
          - action: cover.toggle
            target:
              entity_id: "{{ bank_entity }}"
    default:
      - action: homeassistant.toggle
        target:
          entity_id: "{{ bank_entity }}"

mode: restart
icon: mdi:knob
