blueprint:
  name: "Pivot - Timer - Voice"
  description: >
    Voice control for the Pivot timer. Requires the **Pivot - Timer Control** blueprint
    to also be installed and configured for the same device — this blueprint
    handles voice commands only; the button, gauge, and alarm logic remain in
    that automation.

    **Supported commands:**

    Start with a duration:
    *"Set a 25 minute timer"*, *"Start a 1 hour and 30 minute timer"*,
    *"Set a timer for half an hour"*, *"Set a timer for an hour and a half"*,
    *"Set a timer for a quarter of an hour"*, *"Set a timer for two and a half hours"*

    Start with current duration:
    *"Start timer"*, *"Set timer"*, *"Start a timer"*, *"Set a timer"*, *"Set me a timer"*

    Control:
    *"Pause timer"* / *"Pause the timer"*,
    *"Resume timer"* / *"Resume the timer"* / *"Continue timer"*,
    *"Cancel timer"* / *"Cancel the timer"* / *"Stop timer"* / *"Reset timer"*

    Dismiss alarm:
    *"Dismiss timer"* / *"Dismiss alarm"* / *"Stop the alarm"*

    Status:
    *"How long is left on the timer?"*, *"How much time is left?"*,
    *"How much time remains?"*, *"How much longer is left?"*,
    *"What's left on the timer?"*, *"What's the timer at?"*, *"Timer status"*

    **Before using this blueprint:**
    1. Complete the setup steps for the **Pivot - Timer Control** blueprint first.
    2. Ensure your Assist pipeline has `prefer_local_intents` enabled so voice
       commands are matched locally before being passed to an LLM agent.
  domain: automation
  input:
    suffix:
      name: Device Suffix
      description: >
        Your Pivot device suffix, e.g. `ha_voice_lounge`.
        Must match the suffix used in the Pivot - Timer Control automation.
      selector:
        text:

    pivot_device:
      name: Pivot Device
      description: >
        Select your Pivot VPE device. Used to derive the timer ringing switch
        for alarm dismissal.
      selector:
        device:
          integration: esphome

    tts_entity:
      name: TTS Entity (optional)
      description: Text-to-speech entity for spoken announcements. Leave blank to skip.
      default: ""
      selector:
        entity:
          domain: tts
          multiple: false

variables:
  suffix: !input suffix
  pivot_device: !input pivot_device
  tts_entity_input: !input tts_entity
  bank: |
    {% set ns = namespace(found=0) %}
    {% for i in range(4) %}
      {% if states('text.' ~ suffix ~ '_bank_' ~ (i + 1) ~ '_entity') | lower == 'timer' and ns.found == 0 %}
        {% set ns.found = i + 1 %}
      {% endif %}
    {% endfor %}
    {{ ns.found }}
  tts_entity: >
    {{ tts_entity_input if tts_entity_input | length > 0
       else states('text.' ~ suffix ~ '_tts_entity') }}
  media_player: "{{ states('text.' ~ suffix ~ '_media_player_entity') }}"
  mute_entity: switch.{{ suffix }}_mute_announcements
  timer_state_entity: select.{{ suffix }}_timer_state
  timer_end_entity: text.{{ suffix }}_timer_end
  duration_entity: number.{{ suffix }}_timer_duration
  bank_value_entity: number.{{ suffix }}_bank_{{ bank | int }}_value
  dim_switch_entity: switch.{{ suffix }}_dim_when_idle
  timer_ringing_entity: |
    {{ device_entities(pivot_device)
       | select('match', 'switch\\..*')
       | select('search', 'timer_ringing')
       | list | first | default('') }}

mode: queued
max: 5

triggers:
  # ── Single-slot duration (minutes or hours) ─────────────────────────────────
  - trigger: conversation
    command:
      - "start timer"
      - "set timer"
      - "start a timer"
      - "set a timer"
      - "set me a timer"
      - "start a {duration} minute timer"
      - "start a {duration} hour timer"
      - "set a {duration} minute timer"
      - "set a {duration} hour timer"
      - "set timer for {duration} minutes"
      - "set timer for {duration} hours"
    id: start

  # ── Combined hours + minutes ────────────────────────────────────────────────
  - trigger: conversation
    command:
      - "start a {hours} hour and {minutes} minute timer"
      - "set a {hours} hour and {minutes} minute timer"
      - "set timer for {hours} hours and {minutes} minutes"
    id: start_combined

  # ── Hardcoded natural duration phrases ──────────────────────────────────────
  - trigger: conversation
    command:
      - "set a quarter hour timer"
      - "start a quarter hour timer"
      - "set a timer for a quarter of an hour"
      - "start a timer for a quarter of an hour"
    id: start_15

  - trigger: conversation
    command:
      - "set a half hour timer"
      - "start a half hour timer"
      - "set a timer for half an hour"
      - "start a timer for half an hour"
    id: start_30

  - trigger: conversation
    command:
      - "set a timer for an hour and a half"
      - "start a timer for an hour and a half"
      - "set an hour and a half timer"
    id: start_90

  - trigger: conversation
    command:
      - "set a timer for two and a half hours"
      - "start a timer for two and a half hours"
    id: start_150

  # ── Pause / Resume / Cancel / Dismiss / Status ──────────────────────────────
  - trigger: conversation
    command:
      - "pause timer"
      - "pause the timer"
    id: pause

  - trigger: conversation
    command:
      - "resume timer"
      - "resume the timer"
      - "continue timer"
      - "continue the timer"
      - "unpause timer"
      - "unpause the timer"
    id: resume

  - trigger: conversation
    command:
      - "cancel timer"
      - "cancel the timer"
      - "stop timer"
      - "stop the timer"
      - "reset timer"
      - "reset the timer"
    id: cancel

  - trigger: conversation
    command:
      - "dismiss timer"
      - "dismiss the timer"
      - "dismiss alarm"
      - "stop the alarm"
    id: dismiss

  - trigger: conversation
    command:
      - "how long is left on the timer"
      - "how much time is left"
      - "how much time is left on the timer"
      - "how much time remains"
      - "how much longer is left"
      - "what's the timer at"
      - "what's left on the timer"
      - "timer status"
    id: status

actions:
  # Resolve start duration for all start trigger variants
  - variables:
      start_duration_mins: >
        {% set words = {
          'one': 1, 'two': 2, 'three': 3, 'four': 4, 'five': 5,
          'six': 6, 'seven': 7, 'eight': 8, 'nine': 9, 'ten': 10,
          'eleven': 11, 'twelve': 12, 'thirteen': 13, 'fourteen': 14,
          'fifteen': 15, 'sixteen': 16, 'seventeen': 17, 'eighteen': 18,
          'nineteen': 19, 'twenty': 20, 'twenty-five': 25,
          'thirty': 30, 'forty': 40, 'forty-five': 45,
          'fifty': 50, 'sixty': 60, 'ninety': 90
        } %}
        {% if trigger.id == 'start_15' %}
          15
        {% elif trigger.id == 'start_30' %}
          30
        {% elif trigger.id == 'start_90' %}
          90
        {% elif trigger.id == 'start_150' %}
          150
        {% elif trigger.id == 'start_combined' %}
          {% set h = trigger.slots.hours | lower | trim %}
          {% set m = trigger.slots.minutes | lower | trim %}
          {{ words.get(h, h | int(0)) * 60 + words.get(m, m | int(0)) }}
        {% elif trigger.id == 'start' and trigger.slots is defined and trigger.slots.duration is defined %}
          {% set d = trigger.slots.duration | lower | trim %}
          {{ words.get(d, d | int(0)) }}
        {% else %}
          0
        {% endif %}

  - choose:
      # ── START ──────────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ bank | int(0) > 0 }}"
          - condition: template
            value_template: >
              {{ trigger.id in ['start', 'start_combined', 'start_15', 'start_30', 'start_90', 'start_150'] }}
          - condition: template
            value_template: "{{ is_state(timer_state_entity, 'idle') }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ start_duration_mins | int(0) > 0 }}"
            then:
              - action: number.set_value
                target:
                  entity_id: "{{ duration_entity }}"
                data:
                  value: "{{ start_duration_mins | int }}"
          - action: text.set_value
            target:
              entity_id: "{{ timer_end_entity }}"
            data:
              value: >
                {{ (now() + timedelta(seconds=states(duration_entity) | int(25) * 60)).isoformat() }}
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: running
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: 100
          - action: switch.turn_off
            target:
              entity_id: "{{ dim_switch_entity }}"
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 and not is_state(mute_entity, 'on') }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: >
                    {% set mins = states(duration_entity) | int(25) %}
                    {% set h = mins // 60 %}{% set m = mins % 60 %}
                    {% if h > 0 and m > 0 %}
                      {{ h }} hour and {{ m }} minute timer started.
                    {% elif h > 0 %}
                      {{ h }} hour timer started.
                    {% else %}
                      {{ m }} minute timer started.
                    {% endif %}

      # ── START — already running ────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ bank | int(0) > 0 }}"
          - condition: template
            value_template: >
              {{ trigger.id in ['start', 'start_combined', 'start_15', 'start_30', 'start_90', 'start_150'] }}
          - condition: template
            value_template: "{{ not is_state(timer_state_entity, 'idle') }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 and not is_state(mute_entity, 'on') }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: A timer is already running.

      # ── PAUSE ──────────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ bank | int(0) > 0 }}"
          - condition: template
            value_template: "{{ trigger.id == 'pause' }}"
          - condition: template
            value_template: "{{ is_state(timer_state_entity, 'running') }}"
        sequence:
          - variables:
              remaining_secs: >
                {% set end_str = states(timer_end_entity) %}
                {% if end_str and not end_str.startswith('P') %}
                  {{ [(as_datetime(end_str) - now()).total_seconds(), 0] | max | int }}
                {% else %}
                  0
                {% endif %}
          - action: text.set_value
            target:
              entity_id: "{{ timer_end_entity }}"
            data:
              value: P{{ remaining_secs }}
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: paused
          - action: switch.turn_on
            target:
              entity_id: "{{ dim_switch_entity }}"
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: >
                {% set dur_secs = states(duration_entity) | int(25) * 60 | float %}
                {{ [0, [100, (remaining_secs | float / dur_secs * 100) | round(0) | int] | min] | max if dur_secs > 0 else 0 }}
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 and not is_state(mute_entity, 'on') }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: >
                    {% set h = (remaining_secs // 3600) | int %}
                    {% set m = ((remaining_secs % 3600) // 60) | int %}
                    {% if h > 0 and m > 0 %}
                      Timer paused. {{ h }} {{ 'hour' if h == 1 else 'hours' }} and {{ m }} {{ 'minute' if m == 1 else 'minutes' }} remaining.
                    {% elif h > 0 %}
                      Timer paused. {{ h }} {{ 'hour' if h == 1 else 'hours' }} remaining.
                    {% elif m > 0 %}
                      Timer paused. {{ m }} {{ 'minute' if m == 1 else 'minutes' }} remaining.
                    {% else %}
                      Timer paused. Less than a minute remaining.
                    {% endif %}

      # ── RESUME ─────────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ bank | int(0) > 0 }}"
          - condition: template
            value_template: "{{ trigger.id == 'resume' }}"
          - condition: template
            value_template: "{{ is_state(timer_state_entity, 'paused') }}"
        sequence:
          - variables:
              remaining_secs: "{{ states(timer_end_entity) | replace('P', '') | int(0) }}"
          - action: text.set_value
            target:
              entity_id: "{{ timer_end_entity }}"
            data:
              value: "{{ (now() + timedelta(seconds=remaining_secs)).isoformat() }}"
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: running
          - action: switch.turn_off
            target:
              entity_id: "{{ dim_switch_entity }}"
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 and not is_state(mute_entity, 'on') }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: Timer resumed.

      # ── CANCEL ─────────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ bank | int(0) > 0 }}"
          - condition: template
            value_template: "{{ trigger.id == 'cancel' }}"
          - condition: template
            value_template: >
              {{ is_state(timer_state_entity, 'running')
                 or is_state(timer_state_entity, 'paused') }}
        sequence:
          - action: text.set_value
            target:
              entity_id: "{{ timer_end_entity }}"
            data:
              value: ""
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: idle
          - action: switch.turn_on
            target:
              entity_id: "{{ dim_switch_entity }}"
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 and not is_state(mute_entity, 'on') }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: Timer cancelled.

      # ── DISMISS (alerting) ─────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ bank | int(0) > 0 }}"
          - condition: template
            value_template: "{{ trigger.id == 'dismiss' }}"
          - condition: template
            value_template: "{{ is_state(timer_state_entity, 'alerting') and timer_ringing_entity | length > 0 }}"
        sequence:
          - action: switch.turn_off
            target:
              entity_id: "{{ timer_ringing_entity }}"

      # ── STATUS ─────────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'status' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 and not is_state(mute_entity, 'on') }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: >
                    {% set state = states(timer_state_entity) %}
                    {% if state == 'running' %}
                      {% set end_str = states(timer_end_entity) %}
                      {% set remaining = [(as_datetime(end_str) - now()).total_seconds(), 0] | max | int %}
                      {% set h = (remaining // 3600) | int %}
                      {% set m = ((remaining % 3600) // 60) | int %}
                      {% set s = (remaining % 60) | int %}
                      {% if h > 0 and m > 0 %}
                        {{ h }} {{ 'hour' if h == 1 else 'hours' }} and {{ m }} {{ 'minute' if m == 1 else 'minutes' }} remaining.
                      {% elif h > 0 %}
                        {{ h }} {{ 'hour' if h == 1 else 'hours' }} remaining.
                      {% elif m > 0 %}
                        {{ m }} {{ 'minute' if m == 1 else 'minutes' }} remaining.
                      {% elif s > 0 %}
                        Less than a minute remaining.
                      {% else %}
                        The timer has finished.
                      {% endif %}
                    {% elif state == 'paused' %}
                      {% set remaining = states(timer_end_entity) | replace('P', '') | int(0) %}
                      {% set h = (remaining // 3600) | int %}
                      {% set m = ((remaining % 3600) // 60) | int %}
                      {% if h > 0 and m > 0 %}
                        Timer is paused. {{ h }} {{ 'hour' if h == 1 else 'hours' }} and {{ m }} {{ 'minute' if m == 1 else 'minutes' }} remaining.
                      {% elif h > 0 %}
                        Timer is paused. {{ h }} {{ 'hour' if h == 1 else 'hours' }} remaining.
                      {% elif m > 0 %}
                        Timer is paused. {{ m }} {{ 'minute' if m == 1 else 'minutes' }} remaining.
                      {% else %}
                        Timer is paused. Less than a minute remaining.
                      {% endif %}
                    {% elif state == 'alerting' %}
                      The timer has finished.
                    {% else %}
                      No timer is running.
                    {% endif %}
