blueprint:
  name: "Pivot - Timer Control"
  description: >
    Manages the Pivot countdown timer — alarm, gauge, and physical button control.
    Required even if you only use voice control.

    Single press to start, pause, or resume. Long press to cancel (on the timer bank only).
    TTS announcements use the entity configured in Pivot device settings.

    **Before creating this automation:** enable the three timer entities on your device
    (`number.{suffix}_timer_duration`, `select.{suffix}_timer_state`, `text.{suffix}_timer_end`).

    [Full setup guide →](https://alistairmerritt.github.io/pivot/timer/)
  domain: automation
  input:
    suffix:
      name: Device Suffix
      description: "Your Pivot device suffix, e.g. `ha_voice_lounge`."
      selector:
        text:

    bank:
      name: Bank Number
      description: >
        Bank assigned to the timer (1–4), or `0` for no bank.
        Without a bank the alarm and TTS still work, but the LED gauge and button control are disabled.
      default: 0
      selector:
        number:
          min: 0
          max: 4
          mode: box

    button_event_entity:
      name: Button Event Entity
      description: >
        The button event entity for this device. Used to detect long press (cancel).
        Find it under Settings → Devices & Services → ESPHome → your device.
      selector:
        entity:
          domain: event

    timer_ringing_entity:
      name: Timer Ringing Switch
      description: >
        The `timer_ringing` switch for this device.
        Find it under Settings → Devices & Services → ESPHome → your device.
      selector:
        entity:
          domain: switch

    finish_message:
      name: Finish Message (optional)
      description: Message spoken by TTS once when the timer finishes (before the alarm begins).
      default: "Timer finished"
      selector:
        text:

variables:
  suffix: !input suffix
  bank: !input bank
  finish_message: !input finish_message
  mute_entity: "switch.{{ suffix }}_mute_announcements"
  tts_entity: "{{ states('text.' ~ suffix ~ '_tts_entity') }}"
  timer_ringing_entity: !input timer_ringing_entity
  button_event_entity: !input button_event_entity
  media_player: "{{ states('text.' ~ suffix ~ '_media_player_entity') }}"
  duration_entity: "number.{{ suffix }}_timer_duration"
  timer_state_entity: "select.{{ suffix }}_timer_state"
  timer_end_entity: "text.{{ suffix }}_timer_end"
  dim_switch_entity: "switch.{{ suffix }}_dim_when_idle"
  # Bank-derived entities — empty string when bank = 0 (no bank assigned)
  bank_value_entity: >
    {% if bank | int(0) > 0 %}
      number.{{ suffix }}_bank_{{ bank | int }}_value
    {% else %}

    {% endif %}
  bank_entity_text_entity: >
    {% if bank | int(0) > 0 %}
      text.{{ suffix }}_bank_{{ bank | int }}_entity
    {% else %}

    {% endif %}

trigger:
  # Single press on the configured bank — start / pause / resume / dismiss
  - trigger: event
    event_type: pivot_button_press
    event_data:
      suffix: !input suffix
      bank: !input bank
      press_type: single_press
    id: single_press

  # Long press on any bank on this device — cancel (physical button)
  # Uses a direct state trigger on the button event entity rather than
  # pivot_button_press, which requires the Pivot integration to have a
  # correctly configured device_id (not always the case).
  - trigger: state
    entity_id: !input button_event_entity
    id: long_press

  # Long press via dashboard — fires pivot_button_press with press_type: long_press
  - trigger: event
    event_type: pivot_button_press
    event_data:
      suffix: !input suffix
      bank: !input bank
      press_type: long_press
      bank_entity: timer
    id: long_press

  - trigger: time_pattern
    seconds: "/30"
    id: gauge_sync

  - trigger: event
    event_type: pivot_timer_duration_set
    event_data:
      suffix: !input suffix
    id: duration_changed

action:
  # Discard stale single_press events — prevents queued presses from a
  # previous state firing back-to-back and causing spurious transitions.
  # Long press, gauge_sync, and duration_changed are exempt.
  - condition: template
    value_template: >
      {{ trigger.id != 'single_press' or
         (now() - trigger.event.time_fired).total_seconds() < 2 }}

  - choose:

      # ── Single press: start / pause / resume / dismiss ─────────────────────
      # Only fires when a bank is assigned and that bank is set to 'timer'.
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'single_press' }}"
          - condition: template
            value_template: >
              {{ bank | int(0) > 0
                 and states(bank_entity_text_entity) | lower == 'timer' }}
        sequence:
          - choose:
              # Idle → start (3-second cooldown after dismiss or cancel)
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'idle') }}"
                  - condition: template
                    value_template: >
                      {{ (now() - states[timer_state_entity].last_changed).total_seconds() > 3 }}
                sequence:
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: >
                        {{ (now() + timedelta(seconds=states(duration_entity) | int(25) * 60)).isoformat() }}
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: running
                  - if:
                      - condition: template
                        value_template: "{{ bank | int(0) > 0 }}"
                    then:
                      - action: number.set_value
                        target:
                          entity_id: "{{ bank_value_entity }}"
                        data:
                          value: 100
                      - action: switch.turn_off
                        target:
                          entity_id: "{{ dim_switch_entity }}"
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 and (not mute_entity or not is_state(mute_entity, 'on')) }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: >
                            {% set mins = states(duration_entity) | int(25) %}
                            {% set h = mins // 60 %}
                            {% set m = mins % 60 %}
                            {% if h > 0 and m > 0 %}
                              {{ h }} hour and {{ m }} minute timer started.
                            {% elif h > 0 %}
                              {{ h }} hour timer started.
                            {% else %}
                              {{ m }} minute timer started.
                            {% endif %}

              # Running → pause (store remaining as P{seconds})
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'running') }}"
                sequence:
                  - variables:
                      remaining_secs: >
                        {% set end_str = states(timer_end_entity) %}
                        {% if end_str and not end_str.startswith('P') %}
                          {{ [(as_datetime(end_str) - now()).total_seconds(), 0] | max | int }}
                        {% else %}
                          0
                        {% endif %}
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: "P{{ remaining_secs }}"
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: paused
                  - if:
                      - condition: template
                        value_template: "{{ bank | int(0) > 0 }}"
                    then:
                      - action: switch.turn_on
                        target:
                          entity_id: "{{ dim_switch_entity }}"
                      - action: number.set_value
                        target:
                          entity_id: "{{ bank_value_entity }}"
                        data:
                          value: >
                            {% set dur_secs = states(duration_entity) | int(25) * 60 | float %}
                            {{ [0, [100, (remaining_secs | float / dur_secs * 100) | round(0) | int] | min] | max if dur_secs > 0 else 0 }}
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 and (not mute_entity or not is_state(mute_entity, 'on')) }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: >
                            {% set h = (remaining_secs // 3600) | int %}
                            {% set m = ((remaining_secs % 3600) // 60) | int %}
                            {% if h > 0 and m > 0 %}
                              Timer paused. {{ h }} {{ 'hour' if h == 1 else 'hours' }} and {{ m }} {{ 'minute' if m == 1 else 'minutes' }} remaining.
                            {% elif h > 0 %}
                              Timer paused. {{ h }} {{ 'hour' if h == 1 else 'hours' }} remaining.
                            {% elif m > 0 %}
                              Timer paused. {{ m }} {{ 'minute' if m == 1 else 'minutes' }} remaining.
                            {% else %}
                              Timer paused. Less than a minute remaining.
                            {% endif %}

              # Paused → resume (read P{secs} and recalculate end time)
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'paused') }}"
                sequence:
                  - variables:
                      remaining_secs: "{{ states(timer_end_entity) | replace('P', '') | int(0) }}"
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: >
                        {{ (now() + timedelta(seconds=remaining_secs)).isoformat() }}
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: running
                  - if:
                      - condition: template
                        value_template: "{{ bank | int(0) > 0 }}"
                    then:
                      - action: switch.turn_off
                        target:
                          entity_id: "{{ dim_switch_entity }}"
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 and (not mute_entity or not is_state(mute_entity, 'on')) }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: Timer resumed.

              # Alerting → dismiss (turn off timer_ringing on device; firmware
              # on_turn_off handles the HA state reset back to idle)
              - conditions:
                  - condition: template
                    value_template: >
                      {{ is_state(timer_state_entity, 'alerting')
                         and timer_ringing_entity | length > 0 }}
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ timer_ringing_entity }}"

      # ── Long press: cancel and reset ────────────────────────────────────────
      # Only fires when a bank is assigned and it is the currently active bank —
      # preserving long press for custom actions on other banks.
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'long_press'
                 and (trigger.to_state is none
                      or trigger.to_state.attributes.get('event_type') == 'long_press') }}
          - condition: template
            value_template: >
              {{ bank | int(0) > 0
                 and states('number.' ~ suffix ~ '_active_bank') | int == bank | int }}
          - condition: template
            value_template: >
              {{ is_state(timer_state_entity, 'running')
                 or is_state(timer_state_entity, 'paused') }}
        sequence:
          - action: text.set_value
            target:
              entity_id: "{{ timer_end_entity }}"
            data:
              value: ""
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: idle
          - if:
              - condition: template
                value_template: "{{ bank | int(0) > 0 }}"
            then:
              - action: number.set_value
                target:
                  entity_id: "{{ bank_value_entity }}"
                data:
                  value: 0
              - action: switch.turn_on
                target:
                  entity_id: "{{ dim_switch_entity }}"
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 and (not mute_entity or not is_state(mute_entity, 'on')) }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: Timer cancelled.

      # ── Every 30 seconds: sync gauge and detect finish ─────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'gauge_sync'
                 and is_state(timer_state_entity, 'running') }}
        sequence:
          - variables:
              timer_end_str: "{{ states(timer_end_entity) }}"
              dur_secs: "{{ states(duration_entity) | int(25) * 60 | float }}"
              remaining_secs: >
                {% if timer_end_str and not timer_end_str.startswith('P') %}
                  {{ [(as_datetime(timer_end_str) - now()).total_seconds(), 0] | max }}
                {% else %}
                  0
                {% endif %}
              progress: >
                {% if dur_secs > 0 and remaining_secs | float > 0 %}
                  {{ [0, [100, (remaining_secs | float / dur_secs * 100) | round(0) | int] | min] | max }}
                {% else %}
                  0
                {% endif %}
          - if:
              - condition: template
                value_template: "{{ remaining_secs | float <= 0 }}"
            then:
              # ── Timer finished ────────────────────────────────────────────
              - action: text.set_value
                target:
                  entity_id: "{{ timer_end_entity }}"
                data:
                  value: ""

              # Bank-specific finish actions — only when a bank is assigned
              - if:
                  - condition: template
                    value_template: "{{ bank | int(0) > 0 }}"
                then:
                  - action: number.set_value
                    target:
                      entity_id: "{{ bank_value_entity }}"
                    data:
                      value: 0
                  # Switch back to the timer bank so the alarm is visible
                  - action: number.set_value
                    target:
                      entity_id: "number.{{ suffix }}_active_bank"
                    data:
                      value: "{{ bank }}"

              # Optional one-off TTS announcement before the alarm begins.
              # The 3 s delay lets the announcement finish before the firmware
              # takes over the speaker with the alarm sound.
              - if:
                  - condition: template
                    value_template: "{{ tts_entity | length > 0 and finish_message | length > 0 and (not mute_entity or not is_state(mute_entity, 'on')) }}"
                then:
                  - action: tts.speak
                    target:
                      entity_id: "{{ tts_entity }}"
                    data:
                      media_player_entity_id: "{{ media_player }}"
                      message: "{{ finish_message }}"
                  - delay:
                      seconds: 3

              # Hand off to firmware — setting timer_state to 'alerting' causes
              # the firmware (v0.0.11+) to turn on timer_ringing, which pulses
              # the LED ring and enables the "stop" wake word.  When silent_mode
              # is off (default), the alarm sound also plays.  A single press on
              # the device turns off timer_ringing; the firmware then calls back
              # to HA to set timer_state to 'idle' and turn on dim_when_idle.
              # No HA automation involvement needed for the alarm cycle.
              - action: select.select_option
                target:
                  entity_id: "{{ timer_state_entity }}"
                data:
                  option: alerting

            else:
              # ── Still running — update gauge ──────────────────────────────
              - if:
                  - condition: template
                    value_template: "{{ bank | int(0) > 0 }}"
                then:
                  - action: number.set_value
                    target:
                      entity_id: "{{ bank_value_entity }}"
                    data:
                      value: "{{ progress }}"

      # ── Every 30 seconds: auto-cancel if paused for more than 15 minutes ───
      # Prevents the timer from being stuck in paused state indefinitely.
      # Uses the last_changed timestamp of the timer_state entity — which updates
      # when the state becomes 'paused' — to measure how long the pause has lasted.
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'gauge_sync'
                 and is_state(timer_state_entity, 'paused')
                 and (now() - states[timer_state_entity].last_changed).total_seconds() > 900 }}
        sequence:
          - action: text.set_value
            target:
              entity_id: "{{ timer_end_entity }}"
            data:
              value: ""
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: idle
          - if:
              - condition: template
                value_template: "{{ bank | int(0) > 0 }}"
            then:
              - action: number.set_value
                target:
                  entity_id: "{{ bank_value_entity }}"
                data:
                  value: 0
              - action: switch.turn_on
                target:
                  entity_id: "{{ dim_switch_entity }}"

      # ── Duration changed (knob turned while idle): announce selected time ──
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'duration_changed'
                 and is_state(timer_state_entity, 'idle') }}
        sequence:
          # Debounce — wait for the knob to stop turning
          - wait_for_trigger:
              - trigger: event
                event_type: pivot_timer_duration_set
                event_data:
                  suffix: "{{ suffix }}"
            timeout:
              milliseconds: 150
            continue_on_timeout: true
          # Only announce if nothing changed in that window (knob settled).
          # Duration is read from the original trigger event data rather than
          # the entity state, avoiding a race where the entity hasn't updated
          # in HA yet when the 150ms debounce expires.
          - condition: template
            value_template: "{{ wait.trigger is none }}"
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 and (not mute_entity or not is_state(mute_entity, 'on')) }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: >
                    {% set mins = trigger.event.data.duration | int(25) %}
                    {% set h = mins // 60 %}
                    {% set m = mins % 60 %}
                    {% if h > 0 and m > 0 %}
                      {{ h }} hour and {{ m }} minute timer. Press to start.
                    {% elif h > 0 %}
                      {{ h }} hour timer. Press to start.
                    {% else %}
                      {{ m }} minute timer. Press to start.
                    {% endif %}

mode: queued
max: 10
