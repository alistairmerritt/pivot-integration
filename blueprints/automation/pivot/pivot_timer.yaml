blueprint:
  name: "Pivot — Timer"
  description: >
    Turns a Pivot bank into a Pomodoro-style countdown timer.

    - **Single press** on the selected bank — start if idle, pause if running, resume if paused.
    - **Long press** on the selected bank — cancel and reset the gauge to 0.
    - **Any press** while the finish alert is active — immediately dismisses the alarm.
    - **Gauge** — updates every 5 seconds while the timer is running, draining from 100% to 0% as time runs out.
    - **Finish** — flashes the gauge and plays the finish sound repeatedly until dismissed with any press, or after 10 repeats.
      Optionally speaks a TTS message once before the alert loop begins.
    - **TTS** — if a TTS entity is configured, spoken announcements play on start (*"25 minute timer started"*),
      pause (*"Timer paused. 12 minute remaining"*), resume (*"Timer resumed"*), and finish.

    All entity references are derived from the `suffix` input — no manual entity picking required.

    **Before using this blueprint:**
    1. Enable the three timer helper entities on your Pivot device
       (`number.{suffix}_timer_duration`, `select.{suffix}_timer_state`, `text.{suffix}_timer_end`).
    2. Set the bank entity for the chosen bank to exactly `timer`
       (e.g. set `text.{suffix}_bank_3_entity` to `timer`). This tells Pivot that bank is reserved
       for the timer — the knob is automatically disabled and the timer blueprint takes over.
    3. Set your desired duration on `number.{suffix}_timer_duration` (default: 25 minutes).
  domain: automation
  input:
    suffix:
      name: Device Suffix
      description: >
        Your Pivot device suffix, e.g. `ha_voice_lounge`.
        All timer entity IDs are derived from this value.
      selector:
        text:

    bank:
      name: Bank Number
      description: Which bank button controls the timer (1–4). The bank entity for this bank must be set to `timer`.
      default: 1
      selector:
        number:
          min: 1
          max: 4
          mode: box

    media_player:
      name: Media Player
      description: Media player to play the finish alert through.
      selector:
        entity:
          domain: media_player

    tts_entity:
      name: TTS Entity (optional)
      description: Text-to-speech entity for a one-off finish announcement. Leave blank to skip.
      default: ""
      selector:
        entity:
          domain: tts
          multiple: false

    finish_message:
      name: Finish Message (optional)
      description: Message spoken by TTS once when the timer finishes (before the alert loop).
      default: "Timer finished"
      selector:
        text:

variables:
  suffix: !input suffix
  bank: !input bank
  media_player: !input media_player
  tts_entity: !input tts_entity
  finish_message: !input finish_message
  duration_entity: "number.{{ suffix }}_timer_duration"
  timer_state_entity: "select.{{ suffix }}_timer_state"
  timer_end_entity: "text.{{ suffix }}_timer_end"
  bank_value_entity: "number.{{ suffix }}_bank_{{ bank | int - 1 }}_value"
  bank_entity_text_entity: "text.{{ suffix }}_bank_{{ bank | int - 1 }}_entity"
  dim_switch_entity: "switch.{{ suffix }}_dim_when_idle"
  finish_sound: "https://raw.githubusercontent.com/esphome/home-assistant-voice-pe/dev/sounds/timer_finished.flac"

trigger:
  - trigger: event
    event_type: pivot_button_press
    id: button_press

  - trigger: time_pattern
    seconds: "/5"
    id: gauge_sync

  - trigger: event
    event_type: pivot_timer_duration_set
    id: duration_changed

action:
  # Discard stale single_press events — prevents queued presses from a
  # previous state firing back-to-back and causing spurious transitions.
  # Long press is exempt: it can queue behind gauge_sync instances and
  # must not be discarded simply because it waited in the queue.
  # During alerting state, ALL press types are exempt — dismiss must always work.
  - condition: template
    value_template: >
      {{ trigger.id != 'button_press' or
         trigger.event.data.press_type == 'long_press' or
         is_state(timer_state_entity, 'alerting') or
         (now() - trigger.event.time_fired).total_seconds() < 2 }}

  - choose:

      # ── Any press while alerting: dismiss immediately ────────────────────────
      # This is checked first so it takes priority over all other press handlers.
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_press'
                 and trigger.event.data.suffix == suffix
                 and trigger.event.data.bank | int == bank | int }}
          - condition: template
            value_template: "{{ is_state(timer_state_entity, 'alerting') }}"
        sequence:
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: idle
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: 0
          - action: switch.turn_on
            target:
              entity_id: "{{ dim_switch_entity }}"
          # Hold here so this press becomes stale (> 2 s since time_fired) before
          # any other queued button_press instance runs and tries to start the timer.
          - delay:
              seconds: 3

      # ── Single press: start / pause / resume ───────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_press'
                 and trigger.event.data.suffix == suffix
                 and trigger.event.data.bank | int == bank | int
                 and trigger.event.data.press_type == 'single_press' }}
          # Only act when the bank entity is set to 'timer'
          - condition: template
            value_template: "{{ is_state(bank_entity_text_entity, 'timer') }}"
        sequence:
          - choose:
              # Idle → start
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'idle') }}"
                sequence:
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: >
                        {{ (now() + timedelta(seconds=states(duration_entity) | int(25) * 60)).isoformat() }}
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: running
                  - action: number.set_value
                    target:
                      entity_id: "{{ bank_value_entity }}"
                    data:
                      value: 100
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ dim_switch_entity }}"
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: >
                            {% set mins = states(duration_entity) | int(25) %}
                            {% set h = mins // 60 %}
                            {% set m = mins % 60 %}
                            {% if h > 0 and m > 0 %}
                              {{ h }} hour and {{ m }} minute timer started.
                            {% elif h > 0 %}
                              {{ h }} hour timer started.
                            {% else %}
                              {{ m }} minute timer started.
                            {% endif %}

              # Running → pause (store remaining as P{seconds})
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'running') }}"
                sequence:
                  - variables:
                      remaining_secs: >
                        {% set end_str = states(timer_end_entity) %}
                        {% if end_str and not end_str.startswith('P') %}
                          {{ [(as_datetime(end_str) - now()).total_seconds(), 0] | max | int }}
                        {% else %}
                          0
                        {% endif %}
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: "P{{ remaining_secs }}"
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: paused
                  - action: switch.turn_on
                    target:
                      entity_id: "{{ dim_switch_entity }}"
                  - action: number.set_value
                    target:
                      entity_id: "{{ bank_value_entity }}"
                    data:
                      value: >
                        {% set dur_secs = states(duration_entity) | int(25) * 60 | float %}
                        {{ [0, [100, (remaining_secs | float / dur_secs * 100) | round(0) | int] | min] | max if dur_secs > 0 else 0 }}
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: >
                            {% set h = (remaining_secs // 3600) | int %}
                            {% set m = ((remaining_secs % 3600) // 60) | int %}
                            {% if h > 0 and m > 0 %}
                              Timer paused. {{ h }} hour and {{ m }} minute remaining.
                            {% elif h > 0 %}
                              Timer paused. {{ h }} hour remaining.
                            {% elif m > 0 %}
                              Timer paused. {{ m }} minute remaining.
                            {% else %}
                              Timer paused. Less than a minute remaining.
                            {% endif %}

              # Paused → resume (read P{secs} and recalculate end time)
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'paused') }}"
                sequence:
                  - variables:
                      remaining_secs: "{{ states(timer_end_entity) | replace('P', '') | int(0) }}"
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: >
                        {{ (now() + timedelta(seconds=remaining_secs)).isoformat() }}
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: running
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ dim_switch_entity }}"
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: Timer resumed.

      # ── Long press: cancel and reset gauge ─────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_press'
                 and trigger.event.data.suffix == suffix
                 and trigger.event.data.bank | int == bank | int
                 and trigger.event.data.press_type == 'long_press' }}
          # Only act when the bank entity is set to 'timer'
          - condition: template
            value_template: "{{ is_state(bank_entity_text_entity, 'timer') }}"
        sequence:
          - action: text.set_value
            target:
              entity_id: "{{ timer_end_entity }}"
            data:
              value: ""
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: idle
          - action: switch.turn_on
            target:
              entity_id: "{{ dim_switch_entity }}"

      # ── Every 5 seconds: sync gauge and detect finish ──────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'gauge_sync'
                 and is_state(timer_state_entity, 'running') }}
        sequence:
          - variables:
              timer_end_str: "{{ states(timer_end_entity) }}"
              dur_secs: "{{ states(duration_entity) | int(25) * 60 | float }}"
              remaining_secs: >
                {% if timer_end_str and not timer_end_str.startswith('P') %}
                  {{ [(as_datetime(timer_end_str) - now()).total_seconds(), 0] | max }}
                {% else %}
                  0
                {% endif %}
              progress: >
                {% if dur_secs > 0 and remaining_secs | float > 0 %}
                  {{ [0, [100, (remaining_secs | float / dur_secs * 100) | round(0) | int] | min] | max }}
                {% else %}
                  0
                {% endif %}
          - if:
              - condition: template
                value_template: "{{ remaining_secs | float <= 0 }}"
            then:
              # ── Timer finished ────────────────────────────────────────────
              - action: text.set_value
                target:
                  entity_id: "{{ timer_end_entity }}"
                data:
                  value: ""
              - action: number.set_value
                target:
                  entity_id: "{{ bank_value_entity }}"
                data:
                  value: 0
              - action: switch.turn_on
                target:
                  entity_id: "{{ dim_switch_entity }}"

              # Switch back to the timer bank so the flash is visible and a tap dismisses it
              - action: number.set_value
                target:
                  entity_id: "number.{{ suffix }}_active_bank"
                data:
                  value: "{{ bank }}"

              # Set state to 'alerting' — keeps the integration from treating gauge
              # flashes as knob turns, and signals the dismiss handler to intercept presses.
              - action: select.select_option
                target:
                  entity_id: "{{ timer_state_entity }}"
                data:
                  option: alerting

              # Optional one-off TTS announcement before the alert loop.
              # The 3 s pause uses wait_for_trigger so a press during the announcement
              # also dismisses immediately — no fixed sleep with a dead listener.
              - variables:
                  dismissed: false
              - if:
                  - condition: template
                    value_template: "{{ tts_entity | length > 0 and finish_message | length > 0 }}"
                then:
                  - action: tts.speak
                    target:
                      entity_id: "{{ tts_entity }}"
                    data:
                      media_player_entity_id: "{{ media_player }}"
                      message: "{{ finish_message }}"
                  - wait_for_trigger:
                      - trigger: event
                        event_type: pivot_button_press
                        event_data:
                          suffix: "{{ suffix }}"
                    timeout:
                      seconds: 3
                    continue_on_timeout: true
                  - variables:
                      dismissed: "{{ wait.trigger is not none }}"

              # Alert loop — plays sound + flashes gauge until dismissed or 10 repeats.
              #
              # Every delay is a wait_for_trigger so a button press is catchable at any
              # point in the flash cycle — not just during the quiet window at the end.
              # Both single_press and long_press dismiss the alert.
              - repeat:
                  until: "{{ dismissed or repeat.index >= 10 }}"
                  sequence:
                    # Play finish sound
                    - action: media_player.play_media
                      target:
                        entity_id: "{{ media_player }}"
                      data:
                        media_content_id: "{{ finish_sound }}"
                        media_content_type: music
                    # Flash 1 — on (750 ms)
                    - action: number.set_value
                      target:
                        entity_id: "{{ bank_value_entity }}"
                      data:
                        value: 100
                    - wait_for_trigger:
                        - trigger: event
                          event_type: pivot_button_press
                          event_data:
                            suffix: "{{ suffix }}"
                      timeout:
                        milliseconds: 750
                      continue_on_timeout: true
                    - variables:
                        dismissed: "{{ wait.trigger is not none }}"
                    - condition: template
                      value_template: "{{ not dismissed }}"
                    # Flash 1 — off (400 ms)
                    - action: number.set_value
                      target:
                        entity_id: "{{ bank_value_entity }}"
                      data:
                        value: 0
                    - wait_for_trigger:
                        - trigger: event
                          event_type: pivot_button_press
                          event_data:
                            suffix: "{{ suffix }}"
                      timeout:
                        milliseconds: 400
                      continue_on_timeout: true
                    - variables:
                        dismissed: "{{ wait.trigger is not none }}"
                    - condition: template
                      value_template: "{{ not dismissed }}"
                    # Flash 2 — on (750 ms)
                    - action: number.set_value
                      target:
                        entity_id: "{{ bank_value_entity }}"
                      data:
                        value: 100
                    - wait_for_trigger:
                        - trigger: event
                          event_type: pivot_button_press
                          event_data:
                            suffix: "{{ suffix }}"
                      timeout:
                        milliseconds: 750
                      continue_on_timeout: true
                    - variables:
                        dismissed: "{{ wait.trigger is not none }}"
                    - condition: template
                      value_template: "{{ not dismissed }}"
                    # Flash 2 — off (400 ms)
                    - action: number.set_value
                      target:
                        entity_id: "{{ bank_value_entity }}"
                      data:
                        value: 0
                    - wait_for_trigger:
                        - trigger: event
                          event_type: pivot_button_press
                          event_data:
                            suffix: "{{ suffix }}"
                      timeout:
                        milliseconds: 400
                      continue_on_timeout: true
                    - variables:
                        dismissed: "{{ wait.trigger is not none }}"
                    - condition: template
                      value_template: "{{ not dismissed }}"
                    # Quiet window — wait up to 4 s for a press between flashes
                    - wait_for_trigger:
                        - trigger: event
                          event_type: pivot_button_press
                          event_data:
                            suffix: "{{ suffix }}"
                      timeout:
                        seconds: 4
                      continue_on_timeout: true
                    - variables:
                        dismissed: "{{ wait.trigger is not none }}"

              # Final cleanup — ensure gauge is off and state returns to idle
              - action: number.set_value
                target:
                  entity_id: "{{ bank_value_entity }}"
                data:
                  value: 0
              - action: select.select_option
                target:
                  entity_id: "{{ timer_state_entity }}"
                data:
                  option: idle
              # Hold the automation queue for 3 s so the dismiss press becomes stale
              # (> 2 s since time_fired) before any queued button_press instance runs.
              # Without this, the queued instance sees idle state and starts a new timer.
              - delay:
                  seconds: 3

            else:
              # ── Still running — update gauge ──────────────────────────────
              - action: number.set_value
                target:
                  entity_id: "{{ bank_value_entity }}"
                data:
                  value: "{{ progress }}"

      # ── Duration changed (knob turned while idle): announce selected time ──
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'duration_changed'
                 and trigger.event.data.suffix == suffix
                 and is_state(timer_state_entity, 'idle') }}
        sequence:
          # Debounce — wait for the knob to stop turning
          - wait_for_trigger:
              - trigger: event
                event_type: pivot_timer_duration_set
                event_data:
                  suffix: "{{ suffix }}"
            timeout:
              milliseconds: 600
            continue_on_timeout: true
          # Only announce if nothing changed in that window (knob settled)
          - condition: template
            value_template: "{{ wait.trigger is none }}"
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: >
                    {% set mins = states(duration_entity) | int(25) %}
                    {% set h = mins // 60 %}
                    {% set m = mins % 60 %}
                    {% if h > 0 and m > 0 %}
                      {{ h }} hour and {{ m }} minute timer. Press to start.
                    {% elif h > 0 %}
                      {{ h }} hour timer. Press to start.
                    {% else %}
                      {{ m }} minute timer. Press to start.
                    {% endif %}

mode: queued
max: 3
