blueprint:
  name: "Pivot — Timer"
  description: >
    Turns a Pivot bank into a Pomodoro-style countdown timer.

    - **Single press** on the selected bank — start if idle, pause if running, resume if paused.
    - **Long press** on the selected bank — cancel and reset the gauge to 0.
    - **Gauge** — updates every 5 seconds while the timer is running, showing progress as 0–100%.
    - **Finish** — resets the gauge to 0, plays a finish sound via the media player, and optionally speaks a message via TTS.

    All entity references are derived from the `suffix` input — no manual entity picking required.

    **Before using this blueprint:**
    1. Enable the three timer helper entities on your Pivot device
       (`timer.{suffix}_timer`, `number.{suffix}_timer_duration`, `select.{suffix}_timer_state`).
    2. Set your desired duration on `number.{suffix}_timer_duration` (default: 25 minutes).
  domain: automation
  input:
    suffix:
      name: Device Suffix
      description: >
        Your Pivot device suffix, e.g. `ha_voice_lounge`.
        All timer entity IDs are derived from this value.
      selector:
        text:

    bank:
      name: Bank Number
      description: Which bank button controls the timer (1–4).
      default: 1
      selector:
        number:
          min: 1
          max: 4
          mode: box

    media_player:
      name: Media Player
      description: Media player to play the finish sound through.
      selector:
        entity:
          domain: media_player

    finish_sound:
      name: Finish Sound URL
      description: >
        URL of the audio file to play when the timer finishes.
        Must be accessible by Home Assistant (e.g. a local `/local/` file or external URL).
      default: ""
      selector:
        text:

    tts_entity:
      name: TTS Entity (optional)
      description: Text-to-speech entity for the finish announcement. Leave blank to skip.
      default: ""
      selector:
        text:

    finish_message:
      name: Finish Message (optional)
      description: Message spoken by TTS when the timer finishes.
      default: "Timer finished"
      selector:
        text:

variables:
  suffix: !input suffix
  bank: !input bank
  media_player: !input media_player
  finish_sound: !input finish_sound
  tts_entity: !input tts_entity
  finish_message: !input finish_message
  timer_entity: "timer.{{ suffix }}_timer"
  duration_entity: "number.{{ suffix }}_timer_duration"
  timer_state_entity: "select.{{ suffix }}_timer_state"
  bank_value_entity: "number.{{ suffix }}_bank_{{ bank | int - 1 }}_value"

trigger:
  - trigger: event
    event_type: pivot_button_press
    id: button_press

  - trigger: event
    event_type: timer.finished
    id: timer_finished

  - trigger: time_pattern
    seconds: "/5"
    id: gauge_sync

action:
  - choose:

      # ── Single press: start / pause / resume ───────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_press'
                 and trigger.event.data.suffix == suffix
                 and trigger.event.data.bank | int == bank | int
                 and trigger.event.data.press_type == 'single_press' }}
        sequence:
          - choose:
              # Idle → start with current duration setting
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_entity, 'idle') }}"
                sequence:
                  - action: timer.start
                    target:
                      entity_id: "{{ timer_entity }}"
                    data:
                      duration: "{{ states(duration_entity) | int(25) * 60 }}"
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: running

              # Active → pause
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_entity, 'active') }}"
                sequence:
                  - action: timer.pause
                    target:
                      entity_id: "{{ timer_entity }}"
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: paused

              # Paused → resume
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_entity, 'paused') }}"
                sequence:
                  - action: timer.start
                    target:
                      entity_id: "{{ timer_entity }}"
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: running

      # ── Long press: cancel and reset gauge ─────────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_press'
                 and trigger.event.data.suffix == suffix
                 and trigger.event.data.bank | int == bank | int
                 and trigger.event.data.press_type == 'long_press' }}
        sequence:
          - action: timer.cancel
            target:
              entity_id: "{{ timer_entity }}"
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: idle

      # ── Timer finished: reset gauge, play sound, optional TTS ──────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'timer_finished'
                 and trigger.event.data.entity_id == timer_entity }}
        sequence:
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: idle
          - if:
              - condition: template
                value_template: "{{ finish_sound | length > 0 }}"
            then:
              - action: media_player.play_media
                target:
                  entity_id: "{{ media_player }}"
                data:
                  media_content_id: "{{ finish_sound }}"
                  media_content_type: music
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 and finish_message | length > 0 }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: "{{ finish_message }}"

      # ── Every 5 seconds: sync gauge while timer is active ──────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'gauge_sync'
                 and is_state(timer_entity, 'active') }}
        sequence:
          - variables:
              progress: >
                {% set finishes_at = state_attr(timer_entity, 'finishes_at') %}
                {% set dur_str = state_attr(timer_entity, 'duration') | string %}
                {% set dur_parts = dur_str.split(':') %}
                {% set dur_secs = (dur_parts[0] | int * 3600
                                   + dur_parts[1] | int * 60
                                   + dur_parts[2] | int) | float %}
                {% if finishes_at and dur_secs > 0 %}
                  {% set remaining_secs = [(as_datetime(finishes_at) - now()).total_seconds(), 0] | max %}
                  {{ [0, [100, ((dur_secs - remaining_secs) / dur_secs * 100) | round(0) | int] | min] | max }}
                {% else %}
                  0
                {% endif %}
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: "{{ progress }}"

mode: queued
max: 5
