blueprint:
  name: "Pivot — Timer"
  description: >
    Turns a Pivot bank into a Pomodoro-style countdown timer.

    - **Single press** on the selected bank — start if idle, pause if running, resume if paused. A 3-second cooldown after dismiss or cancel prevents accidental restarts.
    - **Long press** on the timer bank — cancel and reset the timer. Long press on other banks is ignored, leaving it free for custom actions.
    - **Gauge** — updates every 30 seconds while the timer is running, draining from 100% to 0% as time runs out.
    - **Finish** — the device plays the built-in alarm sound and pulses the LED ring (same as the stock VPE timer).
      Single press or "stop" wake word dismisses the alarm. Firing `pivot_button_press` (e.g. from a dashboard button) also dismisses it. Optionally speaks a TTS message once before the alarm begins.
    - **TTS** — if a TTS entity is configured, spoken announcements play on start (*"25 minute timer started"*),
      pause (*"Timer paused. 12 minutes remaining"*), resume (*"Timer resumed"*), and finish.

    **Before using this blueprint:**
    1. Enable the three timer helper entities on your Pivot device
       (`number.{suffix}_timer_duration`, `select.{suffix}_timer_state`, `text.{suffix}_timer_end`).
    2. Set the bank entity for the chosen bank to exactly `timer`
       (e.g. set `text.{suffix}_bank_3_entity` to `timer`). This tells Pivot that bank is reserved
       for the timer — the knob is automatically disabled and the timer blueprint takes over.
    3. Set your desired duration on `number.{suffix}_timer_duration` (default: 25 minutes).
    4. Ensure the device has been reflashed to firmware v0.0.11 or later.
    5. For dashboard alarm dismissal, reflash to v0.0.13 or later (exposes the `timer_ringing` switch).
  domain: automation
  input:
    suffix:
      name: Device Suffix
      description: >
        Your Pivot device suffix, e.g. `ha_voice_lounge`.
        All timer entity IDs are derived from this value.
      selector:
        text:

    bank:
      name: Bank Number
      description: Which bank button controls the timer (1–4). The bank entity for this bank must be set to `timer`.
      default: 1
      selector:
        number:
          min: 1
          max: 4
          mode: box

    pivot_device:
      name: Pivot Device
      description: >
        Select your Pivot VPE device. The media player and timer ringing switch
        are derived automatically from this device.
      selector:
        device:
          integration: esphome

    button_event_entity:
      name: Button Event Entity
      description: >
        The button press event entity for your Pivot device (e.g. `event.home_assistant_voice_study`).
        Used to detect long press (cancel timer) directly from the device.
        Find it under Settings → Devices & Services → ESPHome → your device.
      selector:
        entity:
          domain: event

    tts_entity:
      name: TTS Entity (optional)
      description: Text-to-speech entity for spoken announcements. Leave blank to skip.
      default: ""
      selector:
        entity:
          domain: tts
          multiple: false

    silent_mode:
      name: Silent Mode (optional)
      description: >
        When enabled, the timer alarm suppresses the alarm sound. The LED ring
        still pulses and the "stop" wake word still works — only the sound is
        silenced. Requires firmware v0.0.14 or later.
      default: false
      selector:
        boolean:

    finish_message:
      name: Finish Message (optional)
      description: Message spoken by TTS once when the timer finishes (before the alarm begins).
      default: "Timer finished"
      selector:
        text:

variables:
  suffix: !input suffix
  bank: !input bank
  pivot_device: !input pivot_device
  tts_entity: !input tts_entity
  finish_message: !input finish_message
  silent_mode: !input silent_mode
  # Derive device entities automatically — works regardless of ESPHome device name
  media_player: >
    {{ device_entities(pivot_device)
       | select('match', 'media_player\\..*')
       | list | first | default('') }}
  timer_ringing_entity: >
    {{ device_entities(pivot_device)
       | select('match', 'switch\\..*')
       | select('search', 'timer_ringing')
       | list | first | default('') }}
  timer_silent_mode_entity: >
    {{ device_entities(pivot_device)
       | select('match', 'switch\\..*')
       | select('search', 'timer_silent_mode')
       | list | first | default('') }}
  button_event_entity: >
    {{ device_entities(pivot_device)
       | select('match', 'event\\..*')
       | select('search', 'button')
       | list | first | default('') }}
  duration_entity: "number.{{ suffix }}_timer_duration"
  timer_state_entity: "select.{{ suffix }}_timer_state"
  timer_end_entity: "text.{{ suffix }}_timer_end"
  bank_value_entity: "number.{{ suffix }}_bank_{{ bank | int - 1 }}_value"
  bank_entity_text_entity: "text.{{ suffix }}_bank_{{ bank | int - 1 }}_entity"
  dim_switch_entity: "switch.{{ suffix }}_dim_when_idle"

trigger:
  # Single press on the configured bank — start / pause / resume / dismiss
  - trigger: event
    event_type: pivot_button_press
    event_data:
      suffix: !input suffix
      bank: !input bank
      press_type: single_press
    id: single_press

  # Long press on any bank on this device — cancel (physical button)
  # Uses a direct state trigger on the button event entity rather than
  # pivot_button_press, which requires the Pivot integration to have a
  # correctly configured device_id (not always the case).
  - trigger: state
    entity_id: !input button_event_entity
    id: long_press

  # Long press via dashboard — fires pivot_button_press with press_type: long_press
  - trigger: event
    event_type: pivot_button_press
    event_data:
      suffix: !input suffix
      bank: !input bank
      press_type: long_press
      bank_entity: timer
    id: long_press

  - trigger: time_pattern
    seconds: "/30"
    id: gauge_sync

  - trigger: event
    event_type: pivot_timer_duration_set
    event_data:
      suffix: !input suffix
    id: duration_changed

action:
  # Discard stale single_press events — prevents queued presses from a
  # previous state firing back-to-back and causing spurious transitions.
  # Long press, gauge_sync, and duration_changed are exempt.
  - condition: template
    value_template: >
      {{ trigger.id != 'single_press' or
         (now() - trigger.event.time_fired).total_seconds() < 2 }}

  - choose:

      # ── Single press: start / pause / resume / dismiss ─────────────────────
      - conditions:
          - condition: template
            value_template: "{{ trigger.id == 'single_press' }}"
          - condition: template
            value_template: "{{ is_state(bank_entity_text_entity, 'timer') }}"
        sequence:
          - choose:
              # Idle → start (3-second cooldown after dismiss or cancel)
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'idle') }}"
                  - condition: template
                    value_template: >
                      {{ (now() - states[timer_state_entity].last_changed).total_seconds() > 3 }}
                sequence:
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: >
                        {{ (now() + timedelta(seconds=states(duration_entity) | int(25) * 60)).isoformat() }}
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: running
                  - action: number.set_value
                    target:
                      entity_id: "{{ bank_value_entity }}"
                    data:
                      value: 100
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ dim_switch_entity }}"
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: >
                            {% set mins = states(duration_entity) | int(25) %}
                            {% set h = mins // 60 %}
                            {% set m = mins % 60 %}
                            {% if h > 0 and m > 0 %}
                              {{ h }} hour and {{ m }} minute timer started.
                            {% elif h > 0 %}
                              {{ h }} hour timer started.
                            {% else %}
                              {{ m }} minute timer started.
                            {% endif %}

              # Running → pause (store remaining as P{seconds})
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'running') }}"
                sequence:
                  - variables:
                      remaining_secs: >
                        {% set end_str = states(timer_end_entity) %}
                        {% if end_str and not end_str.startswith('P') %}
                          {{ [(as_datetime(end_str) - now()).total_seconds(), 0] | max | int }}
                        {% else %}
                          0
                        {% endif %}
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: "P{{ remaining_secs }}"
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: paused
                  - action: switch.turn_on
                    target:
                      entity_id: "{{ dim_switch_entity }}"
                  - action: number.set_value
                    target:
                      entity_id: "{{ bank_value_entity }}"
                    data:
                      value: >
                        {% set dur_secs = states(duration_entity) | int(25) * 60 | float %}
                        {{ [0, [100, (remaining_secs | float / dur_secs * 100) | round(0) | int] | min] | max if dur_secs > 0 else 0 }}
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: >
                            {% set h = (remaining_secs // 3600) | int %}
                            {% set m = ((remaining_secs % 3600) // 60) | int %}
                            {% if h > 0 and m > 0 %}
                              Timer paused. {{ h }} {{ 'hour' if h == 1 else 'hours' }} and {{ m }} {{ 'minute' if m == 1 else 'minutes' }} remaining.
                            {% elif h > 0 %}
                              Timer paused. {{ h }} {{ 'hour' if h == 1 else 'hours' }} remaining.
                            {% elif m > 0 %}
                              Timer paused. {{ m }} {{ 'minute' if m == 1 else 'minutes' }} remaining.
                            {% else %}
                              Timer paused. Less than a minute remaining.
                            {% endif %}

              # Paused → resume (read P{secs} and recalculate end time)
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'paused') }}"
                sequence:
                  - variables:
                      remaining_secs: "{{ states(timer_end_entity) | replace('P', '') | int(0) }}"
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: >
                        {{ (now() + timedelta(seconds=remaining_secs)).isoformat() }}
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: running
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ dim_switch_entity }}"
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: Timer resumed.

              # Alerting → dismiss (turn off timer_ringing on device; firmware
              # on_turn_off handles the HA state reset back to idle)
              - conditions:
                  - condition: template
                    value_template: >
                      {{ is_state(timer_state_entity, 'alerting')
                         and timer_ringing_entity | length > 0 }}
                sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ timer_ringing_entity }}"

      # ── Long press: cancel and reset gauge ─────────────────────────────────
      # Only fires when the timer bank is the currently active bank — preserving
      # long press for custom actions on other banks.
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'long_press'
                 and (trigger.to_state is none
                      or trigger.to_state.attributes.get('event_type') == 'long_press') }}
          - condition: template
            value_template: >
              {{ states('number.' ~ suffix ~ '_active_bank') | int == bank | int }}
          - condition: template
            value_template: >
              {{ is_state(timer_state_entity, 'running')
                 or is_state(timer_state_entity, 'paused') }}
        sequence:
          - action: text.set_value
            target:
              entity_id: "{{ timer_end_entity }}"
            data:
              value: ""
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: idle
          - action: switch.turn_on
            target:
              entity_id: "{{ dim_switch_entity }}"
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: Timer cancelled.

      # ── Every 30 seconds: sync gauge and detect finish ─────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'gauge_sync'
                 and is_state(timer_state_entity, 'running') }}
        sequence:
          - variables:
              timer_end_str: "{{ states(timer_end_entity) }}"
              dur_secs: "{{ states(duration_entity) | int(25) * 60 | float }}"
              remaining_secs: >
                {% if timer_end_str and not timer_end_str.startswith('P') %}
                  {{ [(as_datetime(timer_end_str) - now()).total_seconds(), 0] | max }}
                {% else %}
                  0
                {% endif %}
              progress: >
                {% if dur_secs > 0 and remaining_secs | float > 0 %}
                  {{ [0, [100, (remaining_secs | float / dur_secs * 100) | round(0) | int] | min] | max }}
                {% else %}
                  0
                {% endif %}
          - if:
              - condition: template
                value_template: "{{ remaining_secs | float <= 0 }}"
            then:
              # ── Timer finished ────────────────────────────────────────────
              - action: text.set_value
                target:
                  entity_id: "{{ timer_end_entity }}"
                data:
                  value: ""
              - action: number.set_value
                target:
                  entity_id: "{{ bank_value_entity }}"
                data:
                  value: 0

              # Switch back to the timer bank so the alarm is visible
              - action: number.set_value
                target:
                  entity_id: "number.{{ suffix }}_active_bank"
                data:
                  value: "{{ bank }}"

              # Optional one-off TTS announcement before the alarm begins.
              # The 3 s delay lets the announcement finish before the firmware
              # takes over the speaker with the alarm sound.
              - if:
                  - condition: template
                    value_template: "{{ tts_entity | length > 0 and finish_message | length > 0 }}"
                then:
                  - action: tts.speak
                    target:
                      entity_id: "{{ tts_entity }}"
                    data:
                      media_player_entity_id: "{{ media_player }}"
                      message: "{{ finish_message }}"
                  - delay:
                      seconds: 3

              # Silent mode — set or clear the firmware switch before alerting.
              # Requires firmware v0.0.14+; silently skipped on older firmware
              # (entity won't be found so the action targets nothing).
              - if:
                  - condition: template
                    value_template: "{{ timer_silent_mode_entity | length > 0 }}"
                then:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ silent_mode }}"
                        sequence:
                          - action: switch.turn_on
                            target:
                              entity_id: "{{ timer_silent_mode_entity }}"
                    default:
                      - action: switch.turn_off
                        target:
                          entity_id: "{{ timer_silent_mode_entity }}"

              # Hand off to firmware — setting timer_state to 'alerting' causes
              # the firmware (v0.0.11+) to turn on timer_ringing, which pulses
              # the LED ring and enables the "stop" wake word.  When silent_mode
              # is off (default), the alarm sound also plays.  A single press on
              # the device turns off timer_ringing; the firmware then calls back
              # to HA to set timer_state to 'idle' and turn on dim_when_idle.
              # No HA automation involvement needed for the alarm cycle.
              - action: select.select_option
                target:
                  entity_id: "{{ timer_state_entity }}"
                data:
                  option: alerting

            else:
              # ── Still running — update gauge ──────────────────────────────
              - action: number.set_value
                target:
                  entity_id: "{{ bank_value_entity }}"
                data:
                  value: "{{ progress }}"

      # ── Every 30 seconds: auto-cancel if paused for more than 15 minutes ───
      # Prevents the timer from being stuck in paused state indefinitely.
      # Uses the last_changed timestamp of the timer_state entity — which updates
      # when the state becomes 'paused' — to measure how long the pause has lasted.
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'gauge_sync'
                 and is_state(timer_state_entity, 'paused')
                 and (now() - states[timer_state_entity].last_changed).total_seconds() > 900 }}
        sequence:
          - action: text.set_value
            target:
              entity_id: "{{ timer_end_entity }}"
            data:
              value: ""
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: idle
          - action: switch.turn_on
            target:
              entity_id: "{{ dim_switch_entity }}"

      # ── Duration changed (knob turned while idle): announce selected time ──
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'duration_changed'
                 and is_state(timer_state_entity, 'idle') }}
        sequence:
          # Debounce — wait for the knob to stop turning
          - wait_for_trigger:
              - trigger: event
                event_type: pivot_timer_duration_set
                event_data:
                  suffix: "{{ suffix }}"
            timeout:
              milliseconds: 150
            continue_on_timeout: true
          # Only announce if nothing changed in that window (knob settled)
          # AND this instance's duration still matches the current entity —
          # guards against queued instances announcing stale values when the
          # knob is turned slowly (gaps > 600 ms between clicks).
          - condition: template
            value_template: >
              {{ wait.trigger is none
                 and states(duration_entity) | int == trigger.event.data.duration | int }}
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: >
                    {% set mins = states(duration_entity) | int(25) %}
                    {% set h = mins // 60 %}
                    {% set m = mins % 60 %}
                    {% if h > 0 and m > 0 %}
                      {{ h }} hour and {{ m }} minute timer. Press to start.
                    {% elif h > 0 %}
                      {{ h }} hour timer. Press to start.
                    {% else %}
                      {{ m }} minute timer. Press to start.
                    {% endif %}

mode: queued
max: 10
