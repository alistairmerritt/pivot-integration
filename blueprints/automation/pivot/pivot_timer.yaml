blueprint:
  name: "Pivot — Timer"
  description: >
    Turns a Pivot bank into a Pomodoro-style countdown timer.

    - **Single press** on the selected bank — start if idle, pause if running, resume if paused. A 3-second cooldown after dismiss or cancel prevents accidental restarts.
    - **Long press** on the device (any bank) — cancel and reset the timer.
    - **Gauge** — updates every 30 seconds while the timer is running, draining from 100% to 0% as time runs out.
    - **Finish** — the device plays the built-in alarm sound and pulses the LED ring (same as the stock VPE timer).
      Single press dismisses the alarm. Optionally speaks a TTS message once before the alarm begins.
    - **TTS** — if a TTS entity is configured, spoken announcements play on start (*"25 minute timer started"*),
      pause (*"Timer paused. 12 minute remaining"*), resume (*"Timer resumed"*), and finish.

    All entity references are derived from the `suffix` input — no manual entity picking required.

    **Before using this blueprint:**
    1. Enable the three timer helper entities on your Pivot device
       (`number.{suffix}_timer_duration`, `select.{suffix}_timer_state`, `text.{suffix}_timer_end`).
    2. Set the bank entity for the chosen bank to exactly `timer`
       (e.g. set `text.{suffix}_bank_3_entity` to `timer`). This tells Pivot that bank is reserved
       for the timer — the knob is automatically disabled and the timer blueprint takes over.
    3. Set your desired duration on `number.{suffix}_timer_duration` (default: 25 minutes).
    4. Ensure the device has been reflashed to firmware v0.0.11 or later.
  domain: automation
  input:
    suffix:
      name: Device Suffix
      description: >
        Your Pivot device suffix, e.g. `ha_voice_lounge`.
        All timer entity IDs are derived from this value.
      selector:
        text:

    bank:
      name: Bank Number
      description: Which bank button controls the timer (1–4). The bank entity for this bank must be set to `timer`.
      default: 1
      selector:
        number:
          min: 1
          max: 4
          mode: box

    media_player:
      name: Media Player
      description: Media player for TTS announcements (start, pause, resume, finish).
      selector:
        entity:
          domain: media_player

    tts_entity:
      name: TTS Entity (optional)
      description: Text-to-speech entity for spoken announcements. Leave blank to skip.
      default: ""
      selector:
        entity:
          domain: tts
          multiple: false

    finish_message:
      name: Finish Message (optional)
      description: Message spoken by TTS once when the timer finishes (before the alarm begins).
      default: "Timer finished"
      selector:
        text:

variables:
  suffix: !input suffix
  bank: !input bank
  media_player: !input media_player
  tts_entity: !input tts_entity
  finish_message: !input finish_message
  duration_entity: "number.{{ suffix }}_timer_duration"
  timer_state_entity: "select.{{ suffix }}_timer_state"
  timer_end_entity: "text.{{ suffix }}_timer_end"
  bank_value_entity: "number.{{ suffix }}_bank_{{ bank | int - 1 }}_value"
  bank_entity_text_entity: "text.{{ suffix }}_bank_{{ bank | int - 1 }}_entity"
  dim_switch_entity: "switch.{{ suffix }}_dim_when_idle"

trigger:
  - trigger: event
    event_type: pivot_button_press
    id: button_press

  - trigger: time_pattern
    seconds: "/30"
    id: gauge_sync

  - trigger: event
    event_type: pivot_timer_duration_set
    id: duration_changed

action:
  # Discard stale single_press events — prevents queued presses from a
  # previous state firing back-to-back and causing spurious transitions.
  # Long press is exempt: it can arrive slightly late and must not be discarded.
  - condition: template
    value_template: >
      {{ trigger.id != 'button_press' or
         trigger.event.data.press_type == 'long_press' or
         (now() - trigger.event.time_fired).total_seconds() < 2 }}

  - choose:

      # ── Single press: start / pause / resume ───────────────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_press'
                 and trigger.event.data.suffix == suffix
                 and trigger.event.data.bank | int == bank | int
                 and trigger.event.data.press_type == 'single_press' }}
          - condition: template
            value_template: "{{ is_state(bank_entity_text_entity, 'timer') }}"
        sequence:
          - choose:
              # Idle → start (3-second cooldown after dismiss or cancel)
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'idle') }}"
                  - condition: template
                    value_template: >
                      {{ (now() - states[timer_state_entity].last_changed).total_seconds() > 3 }}
                sequence:
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: >
                        {{ (now() + timedelta(seconds=states(duration_entity) | int(25) * 60)).isoformat() }}
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: running
                  - action: number.set_value
                    target:
                      entity_id: "{{ bank_value_entity }}"
                    data:
                      value: 100
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ dim_switch_entity }}"
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: >
                            {% set mins = states(duration_entity) | int(25) %}
                            {% set h = mins // 60 %}
                            {% set m = mins % 60 %}
                            {% if h > 0 and m > 0 %}
                              {{ h }} hour and {{ m }} minute timer started.
                            {% elif h > 0 %}
                              {{ h }} hour timer started.
                            {% else %}
                              {{ m }} minute timer started.
                            {% endif %}

              # Running → pause (store remaining as P{seconds})
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'running') }}"
                sequence:
                  - variables:
                      remaining_secs: >
                        {% set end_str = states(timer_end_entity) %}
                        {% if end_str and not end_str.startswith('P') %}
                          {{ [(as_datetime(end_str) - now()).total_seconds(), 0] | max | int }}
                        {% else %}
                          0
                        {% endif %}
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: "P{{ remaining_secs }}"
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: paused
                  - action: switch.turn_on
                    target:
                      entity_id: "{{ dim_switch_entity }}"
                  - action: number.set_value
                    target:
                      entity_id: "{{ bank_value_entity }}"
                    data:
                      value: >
                        {% set dur_secs = states(duration_entity) | int(25) * 60 | float %}
                        {{ [0, [100, (remaining_secs | float / dur_secs * 100) | round(0) | int] | min] | max if dur_secs > 0 else 0 }}
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: >
                            {% set h = (remaining_secs // 3600) | int %}
                            {% set m = ((remaining_secs % 3600) // 60) | int %}
                            {% if h > 0 and m > 0 %}
                              Timer paused. {{ h }} hour and {{ m }} minute remaining.
                            {% elif h > 0 %}
                              Timer paused. {{ h }} hour remaining.
                            {% elif m > 0 %}
                              Timer paused. {{ m }} minute remaining.
                            {% else %}
                              Timer paused. Less than a minute remaining.
                            {% endif %}

              # Paused → resume (read P{secs} and recalculate end time)
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(timer_state_entity, 'paused') }}"
                sequence:
                  - variables:
                      remaining_secs: "{{ states(timer_end_entity) | replace('P', '') | int(0) }}"
                  - action: text.set_value
                    target:
                      entity_id: "{{ timer_end_entity }}"
                    data:
                      value: >
                        {{ (now() + timedelta(seconds=remaining_secs)).isoformat() }}
                  - action: select.select_option
                    target:
                      entity_id: "{{ timer_state_entity }}"
                    data:
                      option: running
                  - action: switch.turn_off
                    target:
                      entity_id: "{{ dim_switch_entity }}"
                  - if:
                      - condition: template
                        value_template: "{{ tts_entity | length > 0 }}"
                    then:
                      - action: tts.speak
                        target:
                          entity_id: "{{ tts_entity }}"
                        data:
                          media_player_entity_id: "{{ media_player }}"
                          message: Timer resumed.

      # ── Long press: cancel and reset gauge ─────────────────────────────────
      # No bank check — long press is a deliberate, 1-second hold.  It cancels
      # the timer from any bank on this device so the user doesn't have to switch
      # back to the timer bank first.  Guarded against alerting state — during
      # the alarm, single press dismisses natively in firmware.
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'button_press'
                 and trigger.event.data.suffix == suffix
                 and trigger.event.data.press_type == 'long_press' }}
          - condition: template
            value_template: >
              {{ is_state(timer_state_entity, 'running')
                 or is_state(timer_state_entity, 'paused') }}
        sequence:
          - action: text.set_value
            target:
              entity_id: "{{ timer_end_entity }}"
            data:
              value: ""
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: idle
          - action: switch.turn_on
            target:
              entity_id: "{{ dim_switch_entity }}"

      # ── Every 5 seconds: sync gauge and detect finish ──────────────────────
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'gauge_sync'
                 and is_state(timer_state_entity, 'running') }}
        sequence:
          - variables:
              timer_end_str: "{{ states(timer_end_entity) }}"
              dur_secs: "{{ states(duration_entity) | int(25) * 60 | float }}"
              remaining_secs: >
                {% if timer_end_str and not timer_end_str.startswith('P') %}
                  {{ [(as_datetime(timer_end_str) - now()).total_seconds(), 0] | max }}
                {% else %}
                  0
                {% endif %}
              progress: >
                {% if dur_secs > 0 and remaining_secs | float > 0 %}
                  {{ [0, [100, (remaining_secs | float / dur_secs * 100) | round(0) | int] | min] | max }}
                {% else %}
                  0
                {% endif %}
          - if:
              - condition: template
                value_template: "{{ remaining_secs | float <= 0 }}"
            then:
              # ── Timer finished ────────────────────────────────────────────
              - action: text.set_value
                target:
                  entity_id: "{{ timer_end_entity }}"
                data:
                  value: ""
              - action: number.set_value
                target:
                  entity_id: "{{ bank_value_entity }}"
                data:
                  value: 0

              # Switch back to the timer bank so the alarm is visible
              - action: number.set_value
                target:
                  entity_id: "number.{{ suffix }}_active_bank"
                data:
                  value: "{{ bank }}"

              # Optional one-off TTS announcement before the alarm begins.
              # The 3 s delay lets the announcement finish before the firmware
              # takes over the speaker with the alarm sound.
              - if:
                  - condition: template
                    value_template: "{{ tts_entity | length > 0 and finish_message | length > 0 }}"
                then:
                  - action: tts.speak
                    target:
                      entity_id: "{{ tts_entity }}"
                    data:
                      media_player_entity_id: "{{ media_player }}"
                      message: "{{ finish_message }}"
                  - delay:
                      seconds: 3

              # Hand off to firmware — setting timer_state to 'alerting' causes
              # the firmware (v0.0.11+) to turn on timer_ringing, which plays the
              # built-in alarm sound, pulses the LED ring, and enables the "stop"
              # wake word.  A single press on the device turns off timer_ringing;
              # the firmware then calls back to HA to set timer_state to 'idle'
              # and turn on dim_when_idle.  No HA automation involvement needed
              # for the alarm cycle — it is entirely handled in firmware.
              - action: select.select_option
                target:
                  entity_id: "{{ timer_state_entity }}"
                data:
                  option: alerting

            else:
              # ── Still running — update gauge ──────────────────────────────
              - action: number.set_value
                target:
                  entity_id: "{{ bank_value_entity }}"
                data:
                  value: "{{ progress }}"

      # ── Every 5 seconds: auto-cancel if paused for more than 15 minutes ────
      # Prevents the timer from being stuck in paused state indefinitely.
      # Uses the last_changed timestamp of the timer_state entity — which updates
      # when the state becomes 'paused' — to measure how long the pause has lasted.
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'gauge_sync'
                 and is_state(timer_state_entity, 'paused')
                 and (now() - states[timer_state_entity].last_changed).total_seconds() > 900 }}
        sequence:
          - action: text.set_value
            target:
              entity_id: "{{ timer_end_entity }}"
            data:
              value: ""
          - action: number.set_value
            target:
              entity_id: "{{ bank_value_entity }}"
            data:
              value: 0
          - action: select.select_option
            target:
              entity_id: "{{ timer_state_entity }}"
            data:
              option: idle
          - action: switch.turn_on
            target:
              entity_id: "{{ dim_switch_entity }}"

      # ── Duration changed (knob turned while idle): announce selected time ──
      - conditions:
          - condition: template
            value_template: >
              {{ trigger.id == 'duration_changed'
                 and trigger.event.data.suffix == suffix
                 and is_state(timer_state_entity, 'idle') }}
        sequence:
          # Debounce — wait for the knob to stop turning
          - wait_for_trigger:
              - trigger: event
                event_type: pivot_timer_duration_set
                event_data:
                  suffix: "{{ suffix }}"
            timeout:
              milliseconds: 300
            continue_on_timeout: true
          # Only announce if nothing changed in that window (knob settled)
          # AND this instance's duration still matches the current entity —
          # guards against queued instances announcing stale values when the
          # knob is turned slowly (gaps > 600 ms between clicks).
          - condition: template
            value_template: >
              {{ wait.trigger is none
                 and states(duration_entity) | int == trigger.event.data.duration | int }}
          - if:
              - condition: template
                value_template: "{{ tts_entity | length > 0 }}"
            then:
              - action: tts.speak
                target:
                  entity_id: "{{ tts_entity }}"
                data:
                  media_player_entity_id: "{{ media_player }}"
                  message: >
                    {% set mins = states(duration_entity) | int(25) %}
                    {% set h = mins // 60 %}
                    {% set m = mins % 60 %}
                    {% if h > 0 and m > 0 %}
                      {{ h }} hour and {{ m }} minute timer. Press to start.
                    {% elif h > 0 %}
                      {{ h }} hour timer. Press to start.
                    {% else %}
                      {{ m }} minute timer. Press to start.
                    {% endif %}

mode: queued
max: 10
