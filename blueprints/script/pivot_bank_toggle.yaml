blueprint:
  name: "Pivot — Bank Toggle"
  description: >
    Toggles the entity assigned to the currently active bank on a Pivot device.


    **Important:** When saving this script, you must set the script ID to
    `{suffix}_bank_toggle` — so the full entity ID becomes `script.{suffix}_bank_toggle`.
    The firmware calls this entity ID directly on button press. Replace `{suffix}` with
    your device suffix (e.g. `ha_voice_orange`). The friendly name of the script can be
    whatever you like.


    Supports: lights, switches, fans, covers, media players (play/pause), scenes, and scripts.
  domain: script
  input:
    active_bank_entity:
      name: Active Bank Number
      description: "The Active Bank number entity for your Pivot device, e.g. `number.ha_voice_1_active_bank`."
      selector:
        entity:
          domain: number

    bank_0_entity:
      name: Bank 1 Entity (text)
      description: "The Bank 1 Entity text entity, e.g. `text.ha_voice_1_bank_0_entity`."
      selector:
        entity:
          domain: text

    bank_1_entity:
      name: Bank 2 Entity (text)
      description: "The Bank 2 Entity text entity, e.g. `text.ha_voice_1_bank_1_entity`."
      selector:
        entity:
          domain: text

    bank_2_entity:
      name: Bank 3 Entity (text)
      description: "The Bank 3 Entity text entity, e.g. `text.ha_voice_1_bank_2_entity`."
      selector:
        entity:
          domain: text

    bank_3_entity:
      name: Bank 4 Entity (text)
      description: "The Bank 4 Entity text entity, e.g. `text.ha_voice_1_bank_3_entity`."
      selector:
        entity:
          domain: text

variables:
  active_bank_entity: !input active_bank_entity
  bank_0_entity: !input bank_0_entity
  bank_1_entity: !input bank_1_entity
  bank_2_entity: !input bank_2_entity
  bank_3_entity: !input bank_3_entity

sequence:
  - variables:
      bank: "{{ states(active_bank_entity) | int - 1 }}"
      bank_entity: >
        {% set entities = [
          states(bank_0_entity),
          states(bank_1_entity),
          states(bank_2_entity),
          states(bank_3_entity)
        ] %}
        {{ entities[bank] }}
      domain: "{{ bank_entity.split('.')[0] if '.' in bank_entity else '' }}"
  - choose:
      - conditions: "{{ domain == 'scene' }}"
        sequence:
          - action: scene.turn_on
            target:
              entity_id: "{{ bank_entity }}"
      - conditions: "{{ domain == 'script' }}"
        sequence:
          - action: script.turn_on
            target:
              entity_id: "{{ bank_entity }}"
      - conditions: "{{ domain == 'media_player' }}"
        sequence:
          - action: media_player.media_play_pause
            target:
              entity_id: "{{ bank_entity }}"
      - conditions: "{{ domain == 'cover' }}"
        sequence:
          - action: cover.toggle
            target:
              entity_id: "{{ bank_entity }}"
    default:
      - action: homeassistant.toggle
        target:
          entity_id: "{{ bank_entity }}"

mode: restart
icon: mdi:knob
